<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Form</title>
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Poppins,sans-serif;
}

.enquiry-banner{
    min-height:100vh;
    padding:20px;
    background:url('assets/img/enquiry_bg.png') center center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

.enquiry-card{
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:22px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.enquiry-card h2{
    text-align:center;
    font-size:32px;
    font-weight:700;
    margin-bottom:18px;
    color:#181818;
}

.enquiry-card h2 span{
    color:#ff9b24;
}

.form-group{
    margin-bottom:12px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-size:15px;
    font-weight:600;
    color:#333;
}

.form-group input,
.form-group select{
    width:100%;
    height:46px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:0 15px;
    font-size:14px;
    outline:none;
    transition:.3s;
}

.form-group input:focus,
.form-group select:focus{
    border-color:#ff9b24;
    box-shadow:0 0 0 3px rgba(255,155,36,.15);
}

.button-group{
    display:flex;
    gap:12px;
    margin-top:20px;
}

.cancel-btn{
    flex:1;
    height:50px;
    border:2px solid #dcdcdc;
    border-radius:10px;
    background:#fff;
    color:#555;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.cancel-btn:hover{
    background:#f5f5f5;
}

.submit-btn{
    flex:1;
    height:50px;
    border:none;
    border-radius:10px;
    background:#ff9b24;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#ff8500;
}

@media(max-width:768px){

    .enquiry-banner{
        padding:15px;
    }

    .enquiry-card{
        padding:20px;
    }

    .enquiry-card h2{
        font-size:28px;
        margin-bottom:20px;
    }

    .form-group{
        margin-bottom:14px;
    }

    .form-group input,
    .form-group select{
        height:48px;
    }

     .submit-btn,
    .cancel-btn{
        height:48px;
    }
        .button-group{
        flex-direction:column;
    }
}
</style>
<body>
    <section class="enquiry-banner">
    <div class="enquiry-card">

        <h2>ENQUIRY <span>FORM</span></h2>

<form action="send-enquiry.php" method="POST">

         <div class="form-group">
                <label>Full Name</label>
<input type="text" name="name" placeholder="Enter your name" required>

            </div>

            <div class="form-group">
                <label>Mobile Number</label>
<input type="tel" name="mobile" placeholder="Enter mobile number" required>

            </div>

            <div class="form-group">
                <label>Email Address</label>
<input type="email" name="email" placeholder="Enter email address" required>

            </div>

            <div class="form-group">
                <label>Course</label>
<input type="text" name="course" placeholder="Enter Interested Course" required>
            </div>

           <div class="button-group">
  

    <button type="submit" class="submit-btn">
        Submit
    </button>
      <button type="reset" class="cancel-btn">
        Cancel
    </button>
</div>
        </form>

    </div>
</section>
</body>
</html>
